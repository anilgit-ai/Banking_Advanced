<div class="account-list">
  @for (account of accounts; track account.id) {
    <app-card>
      <div class="account-list__item">
        <div>
          <h3>
            {{ account.accountType }}
          </h3>

          <p>
            {{ account.accountNumber }}
          </p>
        </div>

        <div>
          <strong>
            {{ account.balance | currency: account.currency }}
          </strong>
        </div>
      </div>
    </app-card>
  }
</div>
